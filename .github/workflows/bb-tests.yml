name: bb CLI tests

# Runs the working-with-bitbucket-api integration suite (node:test + Express
# mock server) only when the skill that owns the `bb` CLI is touched, so PRs
# that don't change the CLI aren't slowed down by it.
on:
  pull_request:
    paths:
      - 'skills/working-with-bitbucket-api/**'
      - '.github/workflows/bb-tests.yml'
  push:
    branches: [main]
    paths:
      - 'skills/working-with-bitbucket-api/**'
      - '.github/workflows/bb-tests.yml'

defaults:
  run:
    working-directory: skills/working-with-bitbucket-api/tests

jobs:
  bb-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: skills/working-with-bitbucket-api/tests/pnpm-lock.yaml

      # ubuntu-latest ships curl + jq, which `bb` shells out to. Assert they
      # exist so a missing tool fails loudly here rather than as a cryptic
      # mid-test error.
      - name: Verify bb runtime deps
        run: curl --version && jq --version

      - name: Install test deps
        run: pnpm install --frozen-lockfile

      - name: Run bb integration suite
        run: pnpm test
